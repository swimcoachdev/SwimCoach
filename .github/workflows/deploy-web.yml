name: Deploy web (GitHub Pages)

# Builds the Expo web export and publishes it to GitHub Pages on every push to main.
# Replaces the old hand-committed `gh-pages` branch. Once this run is green:
#   Settings -> Pages -> Source = "GitHub Actions", then the gh-pages branch can be deleted
#   (which also permanently removes the ~263 MB of node_modules stuck in its history).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; newer pushes cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Export web build
        env:
          # Project Pages serve under /SwimCoach/ -> app.config.js turns this into the web baseUrl.
          EXPO_WEB_BASE_PATH: /SwimCoach
          # EXPO_PUBLIC_* are inlined into the JS bundle at build time. Public by design (RLS guards data).
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_KEY }}
        run: |
          npx expo export --platform web
          # output: "single" is an SPA. GitHub Pages serves 404.html for unknown deep links;
          # copying index.html there lets the client router take over on a hard refresh.
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
